{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'users/login.css' %}">
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h2>Reset Password</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Email</label>
                {{ form.email }}
            </div>

            <button type="submit" class="login-button">
                Send Reset Link
            </button>
        </form>

        <div class="login-links">
            <a href="{% url 'account_login' %}">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
