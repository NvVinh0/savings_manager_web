{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'users/login.css' %}">
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h2>Email Verification</h2>

        {% if confirmation %}
            <p>Confirm your email to continue.</p>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="login-button">
                    Confirm Email
                </button>
            </form>
        {% else %}
            <p>This confirmation link is invalid or expired.</p>
        {% endif %}

        <div class="login-links">
            <a href="{% url 'account_login' %}">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
