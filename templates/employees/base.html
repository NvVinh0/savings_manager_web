{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Employee Page{% endblock %}</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="{% static 'styles.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="topbar">
        <div class="left-section">
            <a href="{% url 'employee_dashboard' %}" class="app-name">Employee Page</a>
            <a href="{% url 'manage_users' %}" class="nav-button">Users</a>
            <a href="{% url 'manage_saving_accounts' %}" class="nav-button">Savings</a>
            <a href="{% url 'manage_transactions' %}" class="nav-button">Transactions</a>
        </div>

        <div class="right-section">
            <div class="user-menu">
                <a href="#" class="nav-login">{{ user.email }}</a>

                <div class="dropdown">
                    <a href="#">Dashboard</a>
                    <a href="{% url 'account_logout' %}">Logout</a>
                </div>
            </div>
        </div>
    </div>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
